name: CI

on: [ push, pull_request ]

jobs:
  native-compilation:
    runs-on: windows-latest
    name: Native Compilation
    steps:
      - uses: actions/checkout@v4

      - name: Check CMake version
        run: cmake --version

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Generate CMake project
        run: cmake -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=RelWithDebInfo -S . -B build -G Ninja

      - name: Build 64bit RelWithDebInfo DLL
        run: cmake --build ./build --config RelWithDebInfo --target Lumina --

      - name: Check if DLL got built
        run: if (-Not (Test-Path -path "build/Lumina.dll")) {throw 1}

      - name: Rename DLL to Lumina-dev-{GITHUB_SHA}.dll
        run: |
          del Lumina-dev-*.dll
          del Lumina-dev-*.pdb
          ren Lumina.dll Lumina-dev-${{github.sha}}.dll
          ren Lumina.pdb Lumina-dev-${{github.sha}}.pdb
        working-directory: build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RelWithDebInfo-Native-Clang
          path: |
            build/Lumina-dev-*.dll
            build/Lumina-dev-*.pdb

  cross-compilation:
    runs-on: ubuntu-latest
    name: Cross-compilation
    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake and build tools
        run: |
          sudo apt update
          sudo apt install -y cmake ninja-build

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Generate CMake project
        run: cmake -DUSE_CROSSCOMPILER=Zig -DCMAKE_BUILD_TYPE=RelWithDebInfo -S . -B build -G Ninja

      - name: Build 64bit RelWithDebInfo DLL
        run: cmake --build ./build --config RelWithDebInfo --target Lumina --

      - name: Check if DLL got built
        run: if [ ! -f build/libLumina.dll ]; then exit 1; fi

      - name: Rename DLL to libLumina-dev-{GITHUB_SHA}.dll
        run: |
          mv libLumina.dll libLumina-dev-${{github.sha}}.dll
          mv libLumina.pdb libLumina-dev-${{github.sha}}.pdb
        working-directory: build/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RelWithDebInfo-Cross
          path: |
            build/libLumina-dev-*.dll
            build/libLumina-dev-*.pdb
